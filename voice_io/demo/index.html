<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Callbot Voice Demo — Phase H</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; height: 100vh; display: flex; flex-direction: column; }
.header { padding: 12px 20px; background: #16213e; display: flex; align-items: center; gap: 12px; }
.header h1 { font-size: 18px; flex: 1; }
.status { font-size: 13px; padding: 4px 12px; border-radius: 12px; }
.status.connected { background: #0f5132; color: #75b798; }
.status.disconnected { background: #842029; color: #ea868f; }
.chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
.msg { max-width: 80%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
.msg.user { align-self: flex-end; background: #0a3d62; }
.msg.bot { align-self: flex-start; background: #2d3436; }
.msg .meta { font-size: 11px; color: #888; margin-top: 4px; }
.partial { align-self: flex-end; color: #888; font-style: italic; font-size: 13px; padding: 4px 14px; }
.controls { padding: 16px 20px; background: #16213e; display: flex; gap: 12px; align-items: center; }
.btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; transition: 0.2s; }
.btn:disabled { opacity: 0.4; cursor: default; }
.btn-mic { background: #e74c3c; color: white; }
.btn-mic.recording { background: #27ae60; animation: pulse 1s infinite; }
.btn-stop { background: #f39c12; color: white; }
.btn-send { background: #3498db; color: white; }
input[type=text] { flex: 1; padding: 10px 14px; border: 1px solid #444; border-radius: 8px; background: #2d3436; color: #eee; font-size: 14px; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.7; } }
</style>
</head>
<body>
<div class="header">
  <h1>🎙️ Callbot Voice Demo</h1>
  <span id="status" class="status disconnected">Disconnected</span>
</div>
<div id="chat" class="chat"></div>
<div class="controls">
  <button id="btnMic" class="btn btn-mic" disabled>🎤 녹음</button>
  <button id="btnStop" class="btn btn-stop" disabled>⏹️ Barge-in</button>
  <input id="txtInput" type="text" placeholder="텍스트 입력 (폴백)..." />
  <button id="btnSend" class="btn btn-send" disabled>전송</button>
</div>
<script>
const WS_URL = `ws://${location.host}/api/v1/ws/voice`;
const CHUNK_SIZE = 3200; // 100ms @ 16kHz 16bit mono
const SAMPLE_RATE = 16000;

let ws = null;
let audioCtx = null;
let mediaStream = null;
let workletNode = null;
let isRecording = false;

const chat = document.getElementById('chat');
const statusEl = document.getElementById('status');
const btnMic = document.getElementById('btnMic');
const btnStop = document.getElementById('btnStop');
const btnSend = document.getElementById('btnSend');
const txtInput = document.getElementById('txtInput');

function addMessage(text, cls, meta) {
  const el = document.createElement('div');
  el.className = `msg ${cls}`;
  el.textContent = text;
  if (meta) { const m = document.createElement('div'); m.className = 'meta'; m.textContent = meta; el.appendChild(m); }
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
  return el;
}

let partialEl = null;
function updatePartial(text) {
  if (!partialEl) { partialEl = document.createElement('div'); partialEl.className = 'partial'; chat.appendChild(partialEl); }
  partialEl.textContent = `🗣️ ${text}`;
  chat.scrollTop = chat.scrollHeight;
}
function clearPartial() { if (partialEl) { partialEl.remove(); partialEl = null; } }

function connect() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => {
    statusEl.textContent = 'Connected';
    statusEl.className = 'status connected';
    btnMic.disabled = false;
    btnSend.disabled = false;
  };
  ws.onclose = () => {
    statusEl.textContent = 'Disconnected';
    statusEl.className = 'status disconnected';
    btnMic.disabled = true;
    btnSend.disabled = true;
    btnStop.disabled = true;
    setTimeout(connect, 3000);
  };
  ws.onerror = () => ws.close();
  ws.onmessage = (evt) => {
    const msg = JSON.parse(evt.data);
    if (msg.type === 'transcript') {
      if (msg.is_final) { clearPartial(); addMessage(msg.text, 'user'); }
      else { updatePartial(msg.text); }
    } else if (msg.type === 'response') {
      addMessage(msg.text, 'bot', `${msg.processing_ms}ms`);
      if (msg.audio) playPCM(msg.audio);
    } else if (msg.type === 'interrupted') {
      addMessage('⏹️ 중단됨', 'bot');
    } else if (msg.type === 'fallback') {
      addMessage(`⚠️ ${msg.message}`, 'bot');
    } else if (msg.type === 'error') {
      addMessage(`❌ ${msg.message}`, 'bot');
    }
  };
}

function playPCM(b64) {
  const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  const int16 = new Int16Array(bytes.buffer);
  const float32 = new Float32Array(int16.length);
  for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 32768;
  const ctx = new AudioContext({ sampleRate: SAMPLE_RATE });
  const buf = ctx.createBuffer(1, float32.length, SAMPLE_RATE);
  buf.copyToChannel(float32, 0);
  const src = ctx.createBufferSource();
  src.buffer = buf;
  src.connect(ctx.destination);
  src.start();
}

async function startRecording() {
  audioCtx = new AudioContext({ sampleRate: SAMPLE_RATE });
  mediaStream = await navigator.mediaDevices.getUserMedia({ audio: { sampleRate: SAMPLE_RATE, channelCount: 1, echoCancellation: true } });
  const source = audioCtx.createMediaStreamSource(mediaStream);

  // ScriptProcessorNode fallback (AudioWorklet needs HTTPS)
  const processor = audioCtx.createScriptProcessor(4096, 1, 1);
  processor.onaudioprocess = (e) => {
    if (!isRecording) return;
    const float32 = e.inputBuffer.getChannelData(0);
    const int16 = new Int16Array(float32.length);
    for (let i = 0; i < float32.length; i++) {
      const s = Math.max(-1, Math.min(1, float32[i]));
      int16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
    }
    // Send in CHUNK_SIZE pieces
    const bytes = new Uint8Array(int16.buffer);
    for (let off = 0; off < bytes.length; off += CHUNK_SIZE) {
      const chunk = bytes.slice(off, off + CHUNK_SIZE);
      if (chunk.length === CHUNK_SIZE && ws && ws.readyState === 1) {
        const b64 = btoa(String.fromCharCode(...chunk));
        ws.send(JSON.stringify({ type: 'audio', data: b64 }));
      }
    }
  };
  source.connect(processor);
  processor.connect(audioCtx.destination);

  isRecording = true;
  btnMic.textContent = '⏹️ 종료';
  btnMic.classList.add('recording');
  btnStop.disabled = false;
}

function stopRecording() {
  isRecording = false;
  if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
  if (audioCtx) audioCtx.close();
  btnMic.textContent = '🎤 녹음';
  btnMic.classList.remove('recording');
  btnStop.disabled = true;
  // Send end to trigger STT final + pipeline
  if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'end' }));
}

btnMic.onclick = () => { if (isRecording) stopRecording(); else startRecording(); };
btnStop.onclick = () => { if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'interrupt' })); };
btnSend.onclick = () => {
  const text = txtInput.value.trim();
  if (!text) return;
  addMessage(text, 'user');
  ws.send(JSON.stringify({ type: 'text', text }));
  txtInput.value = '';
};
txtInput.onkeydown = (e) => { if (e.key === 'Enter') btnSend.onclick(); };

connect();
</script>
</body>
</html>
