<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Callbot Voice Demo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #1a1a2e; color: #eee; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 400px; padding: 32px; }
        h1 { text-align: center; margin-bottom: 24px; font-size: 1.5rem; }
        .status { text-align: center; padding: 8px; border-radius: 8px; margin-bottom: 16px; font-size: 0.9rem; }
        .status.connected { background: #16213e; color: #0f0; }
        .status.disconnected { background: #16213e; color: #f55; }
        .controls { display: flex; gap: 12px; justify-content: center; margin-bottom: 24px; }
        button { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        #btnRecord { background: #e94560; color: #fff; }
        #btnRecord.recording { background: #0f3460; animation: pulse 1s infinite; }
        #btnInterrupt { background: #533483; color: #fff; }
        #btnConnect { background: #0f3460; color: #fff; }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .log { background: #16213e; border-radius: 8px; padding: 16px; height: 300px; overflow-y: auto; font-family: monospace; font-size: 0.85rem; line-height: 1.6; }
        .log .user { color: #e94560; }
        .log .bot { color: #0f0; }
        .log .sys { color: #888; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎙️ Callbot Voice Demo</h1>
        <div class="status disconnected" id="status">연결 안됨</div>
        <div class="controls">
            <button id="btnConnect">연결</button>
            <button id="btnRecord" disabled>🎤 녹음</button>
            <button id="btnInterrupt" disabled>⏹ 중단</button>
        </div>
        <div class="log" id="log"></div>
    </div>

    <script>
        const log = document.getElementById('log');
        const status = document.getElementById('status');
        const btnConnect = document.getElementById('btnConnect');
        const btnRecord = document.getElementById('btnRecord');
        const btnInterrupt = document.getElementById('btnInterrupt');

        let ws = null;
        let mediaRecorder = null;
        let audioContext = null;
        let isRecording = false;

        function addLog(text, cls = 'sys') {
            const div = document.createElement('div');
            div.className = cls;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${text}`;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
        }

        btnConnect.onclick = () => {
            const wsUrl = prompt('WebSocket URL:', 'ws://localhost:8000/api/v1/ws/voice');
            if (!wsUrl) return;
            ws = new WebSocket(wsUrl);
            ws.binaryType = 'arraybuffer';

            ws.onopen = () => {
                status.textContent = '연결됨';
                status.className = 'status connected';
                btnRecord.disabled = false;
                btnInterrupt.disabled = false;
                addLog('WebSocket 연결 성공');
            };

            ws.onmessage = (e) => {
                if (typeof e.data === 'string') {
                    const msg = JSON.parse(e.data);
                    if (msg.type === 'session_started') {
                        addLog(`세션 시작: ${msg.session_id}`);
                    } else if (msg.type === 'transcript') {
                        addLog(`인식: ${msg.text}`, 'user');
                    } else if (msg.type === 'response_text') {
                        addLog(`응답: ${msg.text}`, 'bot');
                    } else if (msg.type === 'error') {
                        addLog(`오류: ${msg.message}`, 'sys');
                    } else if (msg.type === 'partial_transcript') {
                        addLog(`(부분) ${msg.text}`, 'sys');
                    }
                } else {
                    // Binary = TTS audio
                    playAudio(e.data);
                    addLog('🔊 음성 응답 재생');
                }
            };

            ws.onclose = () => {
                status.textContent = '연결 종료';
                status.className = 'status disconnected';
                btnRecord.disabled = true;
                btnInterrupt.disabled = true;
                addLog('WebSocket 연결 종료');
            };
        };

        btnRecord.onclick = async () => {
            if (isRecording) {
                mediaRecorder.stop();
                btnRecord.textContent = '🎤 녹음';
                btnRecord.classList.remove('recording');
                isRecording = false;
                return;
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
                const chunks = [];

                mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const blob = new Blob(chunks, { type: 'audio/webm' });
                    const buffer = await blob.arrayBuffer();
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        ws.send(buffer);
                        addLog('오디오 전송 완료', 'user');
                    }
                    stream.getTracks().forEach(t => t.stop());
                };

                mediaRecorder.start();
                btnRecord.textContent = '⏹ 정지';
                btnRecord.classList.add('recording');
                isRecording = true;
                addLog('녹음 시작...');
            } catch (err) {
                addLog(`마이크 오류: ${err.message}`);
            }
        };

        btnInterrupt.onclick = () => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'interrupt' }));
                addLog('중단 요청 전송');
            }
        };

        async function playAudio(buffer) {
            if (!audioContext) audioContext = new AudioContext();
            try {
                const decoded = await audioContext.decodeAudioData(buffer);
                const source = audioContext.createBufferSource();
                source.buffer = decoded;
                source.connect(audioContext.destination);
                source.start();
            } catch (e) {
                addLog(`오디오 재생 실패: ${e.message}`);
            }
        }
    </script>
</body>
</html>
