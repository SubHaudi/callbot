name: CI

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]

env:
  CALLBOT_EXTERNAL_BACKEND: fake

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Run tests
        run: |
          uv run pytest \
            business/tests/ \
            external/tests/ \
            nlu/tests/ \
            orchestrator/tests/ \
            llm_engine/tests/ \
            server/tests/ \
            session/tests/ \
            security/tests/ \
            --ignore=nlu/tests/test_bert_intent_classifier.py \
            --ignore=session/tests/test_pg_connection_integration.py \
            -q --tb=short

  smoke:
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: callbot_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Boot server & smoke test
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/callbot_test
          REDIS_HOST: localhost
          BEDROCK_MODEL_ID: anthropic.claude-3-5-sonnet-20241022-v2:0
          BEDROCK_REGION: ap-northeast-2
          CALLBOT_EXTERNAL_BACKEND: fake
        run: |
          uv run python -m uvicorn server.app:create_app --host 0.0.0.0 --port 8000 --factory &
          sleep 5
          # Health check
          curl -f http://localhost:8000/health || { echo "Health check failed"; exit 1; }
          # Turn API
          curl -f -X POST http://localhost:8000/api/v1/turn \
            -H 'Content-Type: application/json' \
            -d '{"caller_id":"ci-smoke","text":"요금 조회"}' || { echo "Turn API failed"; exit 1; }
          echo "Smoke test passed ✅"
          kill %1
