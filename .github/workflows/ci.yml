name: CI

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]

env:
  CALLBOT_EXTERNAL_BACKEND: fake

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Run tests
        run: |
          uv run pytest \
            business/tests/ \
            external/tests/ \
            nlu/tests/ \
            orchestrator/tests/ \
            llm_engine/tests/ \
            server/tests/ \
            session/tests/ \
            security/tests/ \
            --ignore=nlu/tests/test_bert_intent_classifier.py \
            --ignore=session/tests/test_pg_connection_integration.py \
            -q --tb=short
